# Train a model on the literature curated specification and the Srivatsan et al. 2019 dataset

[paths]
root_path = "benchmarks/bio_benchmarks"
data_dir = "data/BRCA/"
model_version = "v1"
model_path = "json/kegg_shortest_path_with_phenotype.json"
spec_version = "v1"
spec_path = "spec/literature_curated_specification.csv"
# Second spec file: Srivatsan data
spec_path_2 = "../srivatsan/spec/srivatsan_spec_master.csv"
spec_version_2 = ""



[model_params]
min_range = 0
max_range = 2  # default
filter_spec = true  # default (filter specification based on nodes in json)
learning_rate = 0.005
n_iter = 200
edge_weight_init = 0.5
use_random_weight_init = false
random_weight_init_distribution = "uniform"
random_weight_init_lower = 0.0
random_weight_init_upper = 2.0
max_update = true
round_val = false
use_ordered_dict = true
check_paths = false
allow_sign_flip = false
tf_method = "sum"

[training]

epochs = 10000  # default
use_hybrid_loss = true
hybrid_loss_alpha = 1
category_curriculum = false
phenotype_nodes_first = false
early_stopping_enabled = true
early_stopping_patience = 20
use_class_weights = false
class_weight_method = "inverse_freq"  # "balanced" or "inverse_freq"
use_warmup = true
warmup_steps = 10
warmup_initial_lr_factor = 0.1  # Initial learning rate factor
use_node_class_weights = true
seed = 42
include_extreme_values_stage = false
test_size = 0.1  # 20% of combined data will be used for testing
val_size = 0.1  # 20% of combined data will be used for validation (60/20/20 split)
# Dual spec mode: combine specs then split into train/val/test
dual_spec_mode = "combined_split"
[debug]
mask_debug = false  # Set to true to see masked edges

