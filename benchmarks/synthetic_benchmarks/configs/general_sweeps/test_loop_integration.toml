# Test config for loop network integration
name = "test_loop_integration"
description = "Test integration of loop networks with benchmarking framework"
output_dir_suffix = "test_loop_integration"
default_seeds = [42]

# These parameters will be applied to all parameter sets
[base_params]
graph_generation.generate_specifications = "true"
graph_generation.grow_base_graph = "false"  # Use pre-generated loop networks
training.model_save_dir = "models"

# Test just two configurations
[[parameter_sets]]
training.n_iter = 5
graph_generation.base_graph_import = "benchmarks/loop_networks/ring_4.json"

[[parameter_sets]]
training.n_iter = 10
graph_generation.base_graph_import = "benchmarks/loop_networks/ring_4.json"

# Plotting configurations
[[plotting_configs]]
x_axis_metric = "override_training.n_iter"
y_axis_metrics = ["test_nonbinary_f1"]
neat_x_axis_label = "Training Iterations (n_iter)"
y_min = 0
y_max = 1
log_x_axis = false