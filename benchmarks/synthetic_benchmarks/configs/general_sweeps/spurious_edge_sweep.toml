# sweeps/configs/spurious_edge_sweep.toml
name = "spurious_edge_sweep"
description = "Investigating impact of spurious edges by scaling number of spurious edges"
output_dir_suffix = "spurious_edge_sweep"
default_seeds = [42, 43, 44]

# These parameters will be applied to all parameter sets
[base_params]
graph_generation.generate_specifications = "true"
graph_generation.n_spurious_edges = 20
specification_generation.n_specifications = 100
training.model_save_dir = "models"  


# Each parameter set represents a different configuration to test
[[parameter_sets]]
specification_generation.min_spec_outputs = 3
specification_generation.max_spec_outputs = 4

[[parameter_sets]]
specification_generation.min_spec_outputs = 7
specification_generation.max_spec_outputs = 8

[[parameter_sets]]
specification_generation.min_spec_outputs = 15
specification_generation.max_spec_outputs = 16

[[parameter_sets]]
specification_generation.min_spec_outputs = 31
specification_generation.max_spec_outputs = 32

[[parameter_sets]]
specification_generation.min_spec_outputs = 63
specification_generation.max_spec_outputs = 64

[[parameter_sets]]
specification_generation.min_spec_outputs = 89
specification_generation.max_spec_outputs = 90

[[plotting_configs]]
x_axis_metric = "override_specification_generation.max_spec_outputs"
y_axis_metrics = ["true_edges_removed", "spurious_edges_removed"]
neat_x_axis_label = "Max Specification Outputs"
neat_y_axis_label = "Fraction of Edges Removed"
figsize = [10, 10]
y_min = 0
y_max = 1

[[plotting_configs]]
x_axis_metric = "override_specification_generation.max_spec_outputs"
y_axis_metrics = ["edge_structure_f1", "edge_structure_mcc", "edge_structure_qwk"]
neat_x_axis_label = "Max Specification Outputs"
figsize = [10, 10]
y_min = 0
y_max = 1