# sweeps/configs/weight_init_method_sweep.toml
name = "weight_init_method_sweep"
description = "Comparing fixed weight initialization (all 0.5) vs random uniform initialization (0-2)"
output_dir_suffix = "weight_init_method_sweep"
default_seeds = [42, 43, 44]

# These parameters will be applied to all parameter sets
[base_params]
graph_generation.generate_specifications = "true"
graph_generation.grow_base_graph = "true"
training.model_save_dir = "models"  

# Each parameter set represents a different configuration to test
[[parameter_sets]]
# Fixed initialization: all weights start at 0.5
training.use_random_weight_init = false
training.edge_weight_init = 0.5

[[parameter_sets]]
# Random initialization: weights uniformly distributed between 0 and 2
training.use_random_weight_init = true
training.random_weight_init_distribution = "uniform"
training.random_weight_init_lower = 0.0
training.random_weight_init_upper = 2.0

[[plotting_configs]]
x_axis_metric = "override_training.use_random_weight_init"
y_axis_metrics = ["test_nonbinary_f1", "test_nonbinary_qwk", "test_nonbinary_mcc"]
neat_x_axis_label = "Random Weight Initialization"
x_axis_labels = ["False", "True"]
figsize = [10, 10]
y_min = 0
y_max = 1