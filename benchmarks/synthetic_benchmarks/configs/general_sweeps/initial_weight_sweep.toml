# sweeps/configs/initial_weight_sweep.toml
name = "initial_weight_sweep"
description = "Investigating impact of different initial edge weights on model performance"
output_dir_suffix = "initial_weight_sweep"
default_seeds = [42, 43, 44]

# These parameters will be applied to all parameter sets
[base_params]
graph_generation.generate_specifications = "true"
graph_generation.grow_base_graph = "true"
training.model_save_dir = "models"  

# Each parameter set represents a different configuration to test
[[parameter_sets]]
training.edge_weight_init = 0.5

[[parameter_sets]]
training.edge_weight_init = 0.75

[[parameter_sets]]
training.edge_weight_init = 1.0

[[parameter_sets]]
training.edge_weight_init = 1.25

[[parameter_sets]]
training.edge_weight_init = 1.5

[[plotting_configs]]
x_axis_metric = "override_training.edge_weight_init"
y_axis_metrics = ["test_nonbinary_f1", "test_nonbinary_qwk", "test_nonbinary_mcc"]
neat_x_axis_label = "Initial Edge Weight"
figsize = [10, 10]
y_min = 0
y_max = 1