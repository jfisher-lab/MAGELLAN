# sweeps/configs/specification_noise_sweep.toml
name = "specification_noise_sweep"
description = "Investigating impact of specification noise by scaling noise fraction"
output_dir_suffix = "specification_noise_sweep"
default_seeds = [42, 43, 44]

# These parameters will be applied to all parameter sets
[base_params]
graph_generation.generate_specifications = "true"
training.model_save_dir = "models"  


# Each parameter set represents a different configuration to test
[[parameter_sets]]
specification_generation.noise_fraction = 0.0

# [[parameter_sets]]
# specification_generation.noise_fraction = 0.01

[[parameter_sets]]
specification_generation.noise_fraction = 0.02

[[parameter_sets]]
specification_generation.noise_fraction = 0.04

[[parameter_sets]]
specification_generation.noise_fraction = 0.08

[[parameter_sets]]
specification_generation.noise_fraction = 0.16

[[plotting_configs]]
x_axis_metric = "override_specification_generation.noise_fraction"
y_axis_metrics = ["test_nonbinary_f1", "test_nonbinary_qwk", "test_nonbinary_mcc"]
neat_x_axis_label = "Noise Fraction"
figsize = [10, 10]
y_min = 0
y_max = 1
